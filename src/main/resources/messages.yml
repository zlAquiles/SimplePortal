  create: "&f/portal create desti:<destination> [block:WATER] &8- &7Create a portal from your current selection."
  wand: "&f/portal wand &8- &7Receive the selector wand."
  reload: "&f/portal reload &8- &7Reload config, messages and portals."
  show: "&f/portal show <radius> &8- &7List nearby portals."
  remove: "&f/portal remove <name> &8- &7Delete a portal."
  setblock: "&f/portal setblock <portal> <block> &8- &7Change the trigger block of an existing portal."
